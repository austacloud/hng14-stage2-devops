name: CI/CD Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install flake8
      - run: flake8 .

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install eslint --save-dev || true
      - run: npx eslint . || true

      - run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - run: find . -name "Dockerfile" -exec hadolint {} \;


# ---------------- TEST ----------------
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API unit tests
        run: pytest


# ---------------- BUILD ----------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api:${{ github.sha }} ./api
      - run: docker build -t worker:${{ github.sha }} ./worker
      - run: docker build -t frontend:${{ github.sha }} ./frontend


# ---------------- SECURITY ----------------
  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api:${{ github.sha }} ./api

      - run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - run: trivy image --severity CRITICAL,HIGH api:${{ github.sha }}


# ---------------- INTEGRATION TEST (FULL STACK) ----------------
  integration:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack (docker compose)
        run: docker compose up -d

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 3
          done
          exit 1

      - name: Test job flow (API → Redis → Worker)
        run: |
          curl -X POST http://localhost:8000/jobs
          sleep 5
          curl http://localhost:8000/jobs

      - name: Shutdown services
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      -name: Checkout code
        uses: actions/checkout@v4 

      - name: Build API image
        run: docker build -t api:${{ github.sha }} api

      - name: Run container
        run: |
          docker run -d --name api -p 80:8000 api:${{ github.sha }}

      - name: Deploy (example - Docker run / server deploy)
        run: |
          echo "Deploying application..."

          docker pull api:${{ github.sha }} || true

          docker run -d --name api -p 80:8000 api:${{ github.sha }}

          for i in {1..12}; do
            curl -f http://localhost:80/health && break
            sleep 5
          done










