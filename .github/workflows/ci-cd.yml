name: CI/CD Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ---------------- LINT STAGE ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python lint tools
        run: |
          pip install flake8

      - name: Run Python lint
        run: flake8 .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: npm install eslint --save-dev || true

      - name: Run JS lint
        run: npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: find . -name "Dockerfile" -exec hadolint {} \;


  # ---------------- TEST STAGE ----------------
  test:
    needs: lint
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Redis
        run: sleep 5
      # ---------------- BUILD API IMAGE ----------------

      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} -f./api/Dockerfile .

      # ---------------- RUN API CONTAINER ---------------

      - name: Run tests inside container
        run: docker run --network ${{ job.services.redis.network }} -e REDIS_HOST=redis api:${{ github.sha }} pytest --cov=api --cov-report=xml
          
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ---------------- BUILD STAGE ----------------
  build:
    needs: test
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest

      - name: Push API image
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker push localhost:5000/worker:${{ github.sha }}

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}


  # ---------------- SECURITY SCAN ----------------
  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} -f api/Dockerfile .

      - name: Build Frontend image
        run: |
          docker build -t frontend:${{ github.sha }} -f frontend/Dockerfile frontend/

      - name: Build Worker image
        run: |
          docker build -t worker:${{ github.sha }} -f worker/Dockerfile .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy 

      - name: Scan API image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format sarif \
            -o trivy-api.sarif \
             api:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


  # ---------------- INTEGRATION TEST ----------------
  integration_test:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              echo "API is up"
              exit 0
            fi
            sleep 5
          done
          echo "API failed"
          exit 1

      - name: Submit job
        run: |
          curl -s -X POST http://localhost:8000/jobs \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Tear down
        if: always()
        run: docker compose down -v


  # ---------------- DEPLOY STAGE ----------------
  deploy:
    needs: integration_test
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy container
        run: |
          docker stop api || true
          docker rm api || true

          docker run -d \
            --name api \
            -p 8000:8000 \
            api:${{ github.sha }}

      - name: Wait for health check
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              echo "Deployment successful"
              exit 0
            fi
            sleep 2
          done

          echo "Deployment failed"
          docker logs api
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          docker stop api || true
          docker rm api || true