name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

  # ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Lint Python
        run: flake8 api

      - name: Lint JavaScript
        run: |
          cd frontend
          npm install
          npm install eslint@8 --save-dev
          npx eslint .

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < api/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < worker/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < frontend/Dockerfile


  # ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: pytest --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ---------------- BUILD ----------------
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest api
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest worker
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


  # ---------------- SECURITY ----------------
  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api.sarif


  # ---------------- INTEGRATION ----------------
  integration:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for API
        run: sleep 10

      - name: Submit job
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/jobs)
          echo $RESPONSE
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job status
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/jobs/${{ env.JOB_ID }} | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


  # ---------------- DEPLOY ----------------
  deploy:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} api

      # 🚀 start new container (do not touch old)
      - name: Start new container
        run: docker run -d --name api_new -p 8080:8000 api:${{ github.sha }}

      # 🩺 health check (60s max)
      - name: Health check
        run: |
          for i in {1..12}; do
            if curl -f http://localhost:8080/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          docker rm -f api_new
          exit 1

      # 🔄 switch traffic
      - name: Replace old container
        run: |
          docker stop api || true
          docker rm api || true
          docker rename api_new api






