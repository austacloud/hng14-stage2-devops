name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

lint:
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ---------------- PYTHON LINT ----------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python lint tool (flake8)
      run: pip install flake8

    - name: Run Python lint
      run: flake8 .

    # ---------------- NODE LINT ----------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install ESLint
      run: npm install -g eslint

    - name: Run JavaScript lint
      run: eslint . || true

    # ---------------- DOCKER LINT ----------------
    - name: Install hadolint
      run: |
        wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
        chmod +x hadolint
        sudo mv hadolint /usr/local/bin/

    - name: Run Dockerfile lint
      run: find . -name "Dockerfile" -exec hadolint {} \;

test:
  needs: lint
  runs-on: ubuntu-latest

  services:
    redis:
      image: redis:7
      options: >-
        --health-cmd "redis-cli ping"
        --health-interval 10s
        --health-timeout 5s
        --health-retries 5

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: pytest -q --disable-warnings --cov=app --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

build:
  needs: test
  runs-on: ubuntu-latest

  services:
    registry:
      image: registry:2
      ports:
        - 5000:5000

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ---------------- SETUP DOCKER ----------------
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to local registry
      run: echo "Skipping auth (local registry)"

    # ---------------- API BUILD ----------------
    - name: Build API image
      run: |
        docker build -t localhost:5000/api:${{ github.sha }} ./api
        docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest

    - name: Push API image
      run: |
        docker push localhost:5000/api:${{ github.sha }}
        docker push localhost:5000/api:latest

    # ---------------- WORKER BUILD ----------------
    - name: Build Worker image
      run: |
        docker build -t localhost:5000/worker:${{ github.sha }} ./worker
        docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest

    - name: Push Worker image
      run: |
        docker push localhost:5000/worker:${{ github.sha }}
        docker push localhost:5000/worker:latest

    # ---------------- FRONTEND BUILD ----------------
    - name: Build Frontend image
      run: |
        docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend
        docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

    - name: Push Frontend image
      run: |
        docker push localhost:5000/frontend:${{ github.sha }}
        docker push localhost:5000/frontend:latest

security:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ---------------- INSTALL TRIVY ----------------
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget -y
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

    # ---------------- UPDATE DB ----------------
    - name: Update Trivy DB
      run: trivy image --download-db-only

    # ---------------- SCAN IMAGE ----------------
    - name: Scan API image
      run: |
        trivy image \
          --severity CRITICAL,HIGH \
          --exit-code 1 \
          --format sarif \
          -o trivy-api.sarif \
          localhost:5000/api:${{ github.sha }}

    # ---------------- UPLOAD RESULTS ----------------
    - name: Upload SARIF report
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-api.sarif

integration_test:
  needs: security
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ---------------- START FULL STACK ----------------
    - name: Start full stack
      run: docker compose up -d

    # ---------------- WAIT FOR API (SMART CHECK) ----------------
    - name: Wait for API health
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:8000/health; then
            echo "API is up!"
            exit 0
          fi
          echo "Waiting for API..."
          sleep 5
        done
        echo "API failed to start"
        exit 1

    # ---------------- SUBMIT JOB ----------------
    - name: Submit job
      run: |
        RESPONSE=$(curl -s -X POST http://localhost:8000/jobs \
          -H "Content-Type: application/json" \
          -d '{}')

        echo "Response: $RESPONSE"

    # ---------------- POLL JOB STATUS ----------------
    - name: Poll job status
      run: |
        python tests/integration_poll.py

    # ---------------- TEARDOWN (ALWAYS RUN) ----------------
    - name: Tear down containers
      if: always()
      run: docker compose down -v

deploy:
  needs: integration_test
  runs-on: ubuntu-latest

  if: github.ref == 'refs/heads/main'

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ---------------- LOGIN TO REGISTRY ----------------
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    # ---------------- DEPLOY NEW VERSION ----------------
    - name: Deploy API container
      run: |
        docker stop api || true
        docker rm api || true

        docker run -d \
          --name api \
          -p 8000:8000 \
          localhost:5000/api:latest

    # ---------------- HEALTH CHECK (SAFE LOOP) ----------------
    - name: Wait for API health
      run: |
        for i in {1..30}; do
          if curl -sf http://localhost:8000/health; then
            echo "API is healthy"
            exit 0
          fi
          echo "Waiting for API..."
          sleep 2
        done

        echo "API failed health check"
        docker logs api
        exit 1

    # ---------------- FAILURE HANDLING ----------------
    - name: Rollback on failure
      if: failure()
      run: |
        echo "Deployment failed - rolling back"
        docker stop api || true
        docker rm api || true
        exit 1